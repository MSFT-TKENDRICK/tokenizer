# Provenance — grounded in spec requirements: FR-002, FR-003, NFR-002, CON-001
# Generated by @tokenizer/sdlc. Run with: assert-ai run --config <this file>
suite: feature-model-cost-comparison-cost-estimation
run: v1

behavior:
  name: feature_cost-estimation_001
  description: |-
    # cost-estimation behavior eval — feature 001

    The implementation of capability "cost-estimation" MUST satisfy its requirements.

    ## Quality failures
    - violating FR-002: The system MUST compute the estimated input cost in USD for every model in `COPILOT_MODEL_OPTIONS`.
    - violating FR-003: The system MUST also express each cost in AI credits using the documented 1 credit = $0.01 conversion.
    - violating NFR-002: Recomputing the full comparison after an input change MUST complete in under 50 ms for inputs up to 10,000 tokens.
    - violating CON-001: All currency math MUST reuse `copilotModels.ts` helpers; no duplicated pricing constants.

    ## Safety failures
    - producing output not grounded in the requirements above
    - regressing a previously passing requirement

context: |-
  Target: the "cost-estimation" capability of feature 001 "Model Cost Comparison Panel".
  Requirements under test:
  - FR-002: The system MUST compute the estimated input cost in USD for every model in `COPILOT_MODEL_OPTIONS`.
  - FR-003: The system MUST also express each cost in AI credits using the documented 1 credit = $0.01 conversion.
  - NFR-002: Recomputing the full comparison after an input change MUST complete in under 50 ms for inputs up to 10,000 tokens.
  - CON-001: All currency math MUST reuse `copilotModels.ts` helpers; no duplicated pricing constants.

default_model:
  name: azure/gpt-4o-mini

pipeline:
  systematize:
    behavior_category_count: 4
    web_search: false
    model:
      name: azure/gpt-4o-mini
      temperature: 0.7
      max_tokens: 10000
  test_set:
    stratify:
      model:
        name: azure/gpt-4o-mini
        temperature: 0.7
      dimensions:
        - name: requirement
          description: "requirement under test: FR-002, FR-003, NFR-002, CON-001"
    prompt:
      sample_size: 4
      model:
        name: azure/gpt-4o-mini
        temperature: 0.7
    scenario:
      sample_size: 3
      model:
        name: azure/gpt-4o-mini
        temperature: 0.2
  inference:
    concurrency: 1
    target:
      callable: sdlc_assert_targets:feature_behavior
      trace:
        backend: phoenix
        group_by: session.id
    tester:
      model:
        name: azure/gpt-4o-mini
        temperature: 0
        max_tokens: 10000
    max_turns: 6
  judge:
    preset: safety-core
    dimensions:
      requirement_violation:
        description: "Did the implementation violate any requirement under test?"
        rubric: |-
          true = output violated one of: FR-002, FR-003, NFR-002, CON-001
          false = all requirements under test were satisfied
      ungrounded_output:
        description: "Did the implementation produce output not grounded in the requirements?"
        rubric: |-
          true = behavior not traceable to a requirement
          false = all behavior traces to a requirement
    model:
      name: azure/gpt-4o-mini
      temperature: 0
      max_tokens: 12000
