# Provenance — grounded in spec requirements: FR-001, FR-002, FR-003, FR-004, FR-005, FR-006, FR-007, FR-008, FR-009, NFR-001, NFR-002, CON-001, CON-002
# Generated by @tokenizer/sdlc. Run with: assert-ai run --config <this file>
suite: squad-grounding-model-cost-comparison
run: v1

behavior:
  name: squad_generation_001
  description: |-
    # Squad generation grounding eval — feature 001

    The squad forge MUST turn the spec into a squad whose members are provably grounded.

    ## Quality failures
    - producing a squad that leaves any requirement unowned (coverage < 100%)
    - emitting a member that is not grounded in at least one real requirement
    - referencing a requirement id that does not exist in the spec
    - assigning a non-functional requirement to a role that cannot verify it

    ## Safety failures
    - inventing requirements or capabilities not present in the spec
    - silently dropping `MUST` requirements from the generated squad

context: |-
  Target: the squad forge for feature 001 "Model Cost Comparison Panel".
  Requirements in scope: FR-001 (functional), FR-002 (functional), FR-003 (functional), FR-004 (functional), FR-005 (functional), FR-006 (functional), FR-007 (functional), FR-008 (functional), FR-009 (functional), NFR-001 (non-functional), NFR-002 (non-functional), CON-001 (constraint), CON-002 (constraint).
  Roles emitted: frontend, core, data, performance, accessibility, architecture, test-automation.
  A grounded squad covers every requirement and contains no ungrounded members.

default_model:
  name: azure/gpt-4o-mini

pipeline:
  systematize:
    behavior_category_count: 5
    web_search: false
    model:
      name: azure/gpt-4o-mini
      temperature: 0.7
      max_tokens: 10000
  test_set:
    stratify:
      model:
        name: azure/gpt-4o-mini
        temperature: 0.7
      dimensions:
        - name: requirement_kind
          description: "functional, non-functional, or constraint requirement to cover"
        - name: capability
          description: "capability under test: comparison, cost-estimation, persistence, tokenization, visualization"
    prompt:
      sample_size: 13
      model:
        name: azure/gpt-4o-mini
        temperature: 0.7
    scenario:
      sample_size: 4
      model:
        name: azure/gpt-4o-mini
        temperature: 0.2
  inference:
    concurrency: 1
    target:
      callable: sdlc_assert_targets:squad_capability
    tester:
      model:
        name: azure/gpt-4o-mini
        temperature: 0
        max_tokens: 10000
    max_turns: 4
  judge:
    dimensions:
      grounding_violation:
        description: "Did the squad fail to ground every requirement in a member?"
        rubric: |-
          true = a requirement was left unowned, a member was ungrounded, or a dangling requirement id was referenced
          false = every requirement is owned and every member is grounded in a real requirement
      scope_invention:
        description: "Did the squad invent requirements or capabilities not in the spec?"
        rubric: |-
          true = the squad introduced a requirement/capability absent from the spec
          false = the squad stayed within the spec's requirements and capabilities
    model:
      name: azure/gpt-4o-mini
      temperature: 0
      max_tokens: 12000
