        - name: requirement
          description: "requirement under test: FR-005, NFR-001"
    prompt:
      sample_size: 3
      model:
        name: azure/gpt-4o-mini
        temperature: 0.7
    scenario:
      sample_size: 3
      model:
        name: azure/gpt-4o-mini
        temperature: 0.2
  inference:
    concurrency: 1
    target:
      callable: sdlc_assert_targets:feature_behavior
      trace:
