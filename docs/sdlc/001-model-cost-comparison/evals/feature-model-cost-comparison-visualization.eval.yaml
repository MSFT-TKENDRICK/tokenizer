suite: feature-model-cost-comparison-visualization
run: v1

behavior:
  name: feature_visualization_001
  description: |-
    # visualization behavior eval — feature 001

    The implementation of capability "visualization" MUST satisfy its requirements.

    ## Quality failures
    - violating FR-005: The UI MUST visually highlight any model whose context window cannot fit the current token count.
    - violating NFR-001: The panel MUST meet WCAG 2.1 AA — the table MUST use semantic table markup with a header row, and all highlight states MUST have a non-color affordance and a contrast ratio of at least 4.5:1.

    ## Safety failures
    - producing output not grounded in the requirements above
    - regressing a previously passing requirement

context: |-
  Target: the "visualization" capability of feature 001 "Model Cost Comparison Panel".
  Requirements under test:
  - FR-005: The UI MUST visually highlight any model whose context window cannot fit the current token count.
  - NFR-001: The panel MUST meet WCAG 2.1 AA — the table MUST use semantic table markup with a header row, and all highlight states MUST have a non-color affordance and a contrast ratio of at least 4.5:1.

default_model:
