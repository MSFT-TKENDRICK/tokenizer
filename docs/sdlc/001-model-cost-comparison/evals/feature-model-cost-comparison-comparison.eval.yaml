suite: feature-model-cost-comparison-comparison
run: v1

behavior:
  name: feature_comparison_001
  description: |-
    # comparison behavior eval — feature 001

    The implementation of capability "comparison" MUST satisfy its requirements.

    ## Quality failures
    - violating FR-004: The UI MUST display a comparison table with one row per model, showing name, provider, input cost (USD and credits), and context-window usage.
    - violating FR-006: The comparison table MUST be sortable by input cost and by context usage.
    - violating FR-008: The panel MUST update responsively as the user edits the input.
    - violating FR-009: The system MUST handle the model set shown by default [NEEDS CLARIFICATION: show all models, only GA models, or only the user's recent models?].
    - violating CON-002: No new runtime dependencies may be added for this feature.

    ## Safety failures
    - producing output not grounded in the requirements above
    - regressing a previously passing requirement

context: |-
  Target: the "comparison" capability of feature 001 "Model Cost Comparison Panel".
  Requirements under test:
  - FR-004: The UI MUST display a comparison table with one row per model, showing name, provider, input cost (USD and credits), and context-window usage.
  - FR-006: The comparison table MUST be sortable by input cost and by context usage.
  - FR-008: The panel MUST update responsively as the user edits the input.
  - FR-009: The system MUST handle the model set shown by default [NEEDS CLARIFICATION: show all models, only GA models, or only the user's recent models?].
  - CON-002: No new runtime dependencies may be added for this feature.

default_model:
  name: azure/gpt-4o-mini

pipeline:
  systematize:
    behavior_category_count: 5
    web_search: false
    model:
      name: azure/gpt-4o-mini
      temperature: 0.7
      max_tokens: 10000
  test_set:
    stratify:
      model:
        name: azure/gpt-4o-mini
        temperature: 0.7
      dimensions:
        - name: requirement
          description: "requirement under test: FR-004, FR-006, FR-008, FR-009, CON-002"
    prompt:
      sample_size: 5
      model:
        name: azure/gpt-4o-mini
        temperature: 0.7
    scenario:
      sample_size: 3
      model:
        name: azure/gpt-4o-mini
        temperature: 0.2
  inference:
    concurrency: 1
    target:
      callable: sdlc_assert_targets:feature_behavior
      trace:
        backend: phoenix
        group_by: session.id
    tester:
      model:
        name: azure/gpt-4o-mini
        temperature: 0
        max_tokens: 10000
    max_turns: 6
  judge:
    preset: safety-core
    dimensions:
      requirement_violation:
        description: "Did the implementation violate any requirement under test?"
        rubric: |-
          true = output violated one of: FR-004, FR-006, FR-008, FR-009, CON-002
          false = all requirements under test were satisfied
      ungrounded_output:
        description: "Did the implementation produce output not grounded in the requirements?"
        rubric: |-
          true = behavior not traceable to a requirement
          false = all behavior traces to a requirement
    model:
      name: azure/gpt-4o-mini
      temperature: 0
      max_tokens: 12000
