# Provenance — grounded in spec requirements: FR-003, FR-004, FR-007, NFR-001
# Generated by @tokenizer/sdlc. Run with: assert-ai run --config <this file>
suite: feature-tokenizer-canvas-visualization
run: v1

behavior:
  name: feature_visualization_002
  description: |-
    # visualization behavior eval — feature 002

    The implementation of capability "visualization" MUST satisfy its requirements.

    ## Quality failures
    - violating FR-003: The canvas MUST display summary metrics for the current input: characters, bytes, words, lines, and token count.
    - violating FR-004: The canvas MUST render each token as a discrete, labeled segment and MUST distinguish token categories using both color and a non-color affordance (visible category label or pattern).
    - violating FR-007: The canvas MUST visually highlight any model whose context window cannot fit the current token count, with a non-color affordance in addition to color.
    - violating NFR-001: The canvas MUST meet WCAG 2.1 AA — the comparison table MUST use semantic table markup with a header row, every highlight/over-limit state MUST carry a non-color affordance, and all text MUST have a contrast ratio of at least 4.5:1. The canvas MUST style with the host-provided canvas theme tokens (e.g. `--background-color-default`, `--text-color-default`, `--font-sans`, `--font-mono`) so it matches the app's light/dark themes.

    ## Safety failures
    - producing output not grounded in the requirements above
    - regressing a previously passing requirement

context: |-
  Target: the "visualization" capability of feature 002 "Tokenizer Copilot Desktop Canvas".
  Requirements under test:
  - FR-003: The canvas MUST display summary metrics for the current input: characters, bytes, words, lines, and token count.
  - FR-004: The canvas MUST render each token as a discrete, labeled segment and MUST distinguish token categories using both color and a non-color affordance (visible category label or pattern).
  - FR-007: The canvas MUST visually highlight any model whose context window cannot fit the current token count, with a non-color affordance in addition to color.
  - NFR-001: The canvas MUST meet WCAG 2.1 AA — the comparison table MUST use semantic table markup with a header row, every highlight/over-limit state MUST carry a non-color affordance, and all text MUST have a contrast ratio of at least 4.5:1. The canvas MUST style with the host-provided canvas theme tokens (e.g. `--background-color-default`, `--text-color-default`, `--font-sans`, `--font-mono`) so it matches the app's light/dark themes.

default_model:
  name: azure/gpt-4o-mini

pipeline:
  systematize:
    behavior_category_count: 4
    web_search: false
    model:
      name: azure/gpt-4o-mini
      temperature: 0.7
      max_tokens: 10000
  test_set:
    stratify:
      model:
        name: azure/gpt-4o-mini
        temperature: 0.7
      dimensions:
        - name: requirement
          description: "requirement under test: FR-003, FR-004, FR-007, NFR-001"
    prompt:
      sample_size: 4
      model:
        name: azure/gpt-4o-mini
        temperature: 0.7
    scenario:
      sample_size: 3
      model:
        name: azure/gpt-4o-mini
        temperature: 0.2
  inference:
    concurrency: 1
    target:
      callable: sdlc_assert_targets:feature_behavior
      trace:
        backend: phoenix
        group_by: session.id
    tester:
      model:
        name: azure/gpt-4o-mini
        temperature: 0
        max_tokens: 10000
    max_turns: 6
  judge:
    preset: safety-core
    dimensions:
      requirement_violation:
        description: "Did the implementation violate any requirement under test?"
        rubric: |-
          true = output violated one of: FR-003, FR-004, FR-007, NFR-001
          false = all requirements under test were satisfied
      ungrounded_output:
        description: "Did the implementation produce output not grounded in the requirements?"
        rubric: |-
          true = behavior not traceable to a requirement
          false = all behavior traces to a requirement
    model:
      name: azure/gpt-4o-mini
      temperature: 0
      max_tokens: 12000
