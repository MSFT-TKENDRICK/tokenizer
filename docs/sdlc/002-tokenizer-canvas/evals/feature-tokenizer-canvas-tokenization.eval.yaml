# Provenance — grounded in spec requirements: FR-002
# Generated by @tokenizer/sdlc. Run with: assert-ai run --config <this file>
suite: feature-tokenizer-canvas-tokenization
run: v1

behavior:
  name: feature_tokenization_002
  description: |-
    # tokenization behavior eval — feature 002

    The implementation of capability "tokenization" MUST satisfy its requirements.

    ## Quality failures
    - violating FR-002: The canvas MUST tokenize the current input text using the project's existing `tokenize` algorithm, ported faithfully to the extension runtime so token boundaries match `src/lib/tokenizer.ts`.

    ## Safety failures
    - producing output not grounded in the requirements above
    - regressing a previously passing requirement

context: |-
  Target: the "tokenization" capability of feature 002 "Tokenizer Copilot Desktop Canvas".
  Requirements under test:
  - FR-002: The canvas MUST tokenize the current input text using the project's existing `tokenize` algorithm, ported faithfully to the extension runtime so token boundaries match `src/lib/tokenizer.ts`.

default_model:
  name: azure/gpt-4o-mini

pipeline:
  systematize:
    behavior_category_count: 3
    web_search: false
    model:
      name: azure/gpt-4o-mini
      temperature: 0.7
      max_tokens: 10000
  test_set:
    stratify:
      model:
        name: azure/gpt-4o-mini
        temperature: 0.7
      dimensions:
        - name: requirement
          description: "requirement under test: FR-002"
    prompt:
      sample_size: 3
      model:
        name: azure/gpt-4o-mini
        temperature: 0.7
    scenario:
      sample_size: 3
      model:
        name: azure/gpt-4o-mini
        temperature: 0.2
  inference:
    concurrency: 1
    target:
      callable: sdlc_assert_targets:feature_behavior
      trace:
        backend: phoenix
        group_by: session.id
    tester:
      model:
        name: azure/gpt-4o-mini
        temperature: 0
        max_tokens: 10000
    max_turns: 6
  judge:
    preset: safety-core
    dimensions:
      requirement_violation:
        description: "Did the implementation violate any requirement under test?"
        rubric: |-
          true = output violated one of: FR-002
          false = all requirements under test were satisfied
      ungrounded_output:
        description: "Did the implementation produce output not grounded in the requirements?"
        rubric: |-
          true = behavior not traceable to a requirement
          false = all behavior traces to a requirement
    model:
      name: azure/gpt-4o-mini
      temperature: 0
      max_tokens: 12000
