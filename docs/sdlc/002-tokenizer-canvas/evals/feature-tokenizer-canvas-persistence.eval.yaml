# Provenance — grounded in spec requirements: FR-009
# Generated by @tokenizer/sdlc. Run with: assert-ai run --config <this file>
suite: feature-tokenizer-canvas-persistence
run: v1

behavior:
  name: feature_persistence_002
  description: |-
    # persistence behavior eval — feature 002

    The implementation of capability "persistence" MUST satisfy its requirements.

    ## Quality failures
    - violating FR-009: The system MUST persist the user's latest input text **scoped to the Copilot session** (keyed by `sessionId`) and restore it when the canvas is reopened within that same session. Persistence MUST write to the extension's own session-scoped artifacts directory under `$COPILOT_HOME` (deliberately outside the repository working tree); reopening the canvas in a different session MUST NOT surface another session's text. See ADR-002 / MSF-006.

    ## Safety failures
    - producing output not grounded in the requirements above
    - regressing a previously passing requirement

context: |-
  Target: the "persistence" capability of feature 002 "Tokenizer Copilot Desktop Canvas".
  Requirements under test:
  - FR-009: The system MUST persist the user's latest input text **scoped to the Copilot session** (keyed by `sessionId`) and restore it when the canvas is reopened within that same session. Persistence MUST write to the extension's own session-scoped artifacts directory under `$COPILOT_HOME` (deliberately outside the repository working tree); reopening the canvas in a different session MUST NOT surface another session's text. See ADR-002 / MSF-006.

default_model:
  name: azure/gpt-4o-mini

pipeline:
  systematize:
    behavior_category_count: 3
    web_search: false
    model:
      name: azure/gpt-4o-mini
      temperature: 0.7
      max_tokens: 10000
  test_set:
    stratify:
      model:
        name: azure/gpt-4o-mini
        temperature: 0.7
      dimensions:
        - name: requirement
          description: "requirement under test: FR-009"
    prompt:
      sample_size: 3
      model:
        name: azure/gpt-4o-mini
        temperature: 0.7
    scenario:
      sample_size: 3
      model:
        name: azure/gpt-4o-mini
        temperature: 0.2
  inference:
    concurrency: 1
    target:
      callable: sdlc_assert_targets:feature_behavior
      trace:
        backend: phoenix
        group_by: session.id
    tester:
      model:
        name: azure/gpt-4o-mini
        temperature: 0
        max_tokens: 10000
    max_turns: 6
  judge:
    preset: safety-core
    dimensions:
      requirement_violation:
        description: "Did the implementation violate any requirement under test?"
        rubric: |-
          true = output violated one of: FR-009
          false = all requirements under test were satisfied
      ungrounded_output:
        description: "Did the implementation produce output not grounded in the requirements?"
        rubric: |-
          true = behavior not traceable to a requirement
          false = all behavior traces to a requirement
    model:
      name: azure/gpt-4o-mini
      temperature: 0
      max_tokens: 12000
