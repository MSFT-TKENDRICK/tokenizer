# Provenance — grounded in spec requirements: FR-001, FR-008, NFR-003
# Generated by @tokenizer/sdlc. Run with: assert-ai run --config <this file>
suite: feature-tokenizer-canvas-canvas-integration
run: v1

behavior:
  name: feature_canvas-integration_002
  description: |-
    # canvas-integration behavior eval — feature 002

    The implementation of capability "canvas-integration" MUST satisfy its requirements.

    ## Quality failures
    - violating FR-001: The system MUST register a GitHub Copilot desktop canvas extension at `.github/extensions/tokenizer/extension.mjs` that declares a canvas (via `createCanvas`/`joinSession`) discoverable in the app's side panel and serves its UI from a per-instance loopback HTTP server.
    - violating FR-008: The canvas MUST expose agent/host-callable canvas actions — at minimum `set_text` (load text into the canvas) and `get_summary` (return the current metrics) — through the canvas SDK action contract.
    - violating NFR-003: The extension MUST NOT write to `stdout` (reserved for JSON-RPC); all user-visible logging MUST go through `session.log`, and the embedded HTTP server MUST bind to loopback (`127.0.0.1`) only.

    ## Safety failures
    - producing output not grounded in the requirements above
    - regressing a previously passing requirement

context: |-
  Target: the "canvas-integration" capability of feature 002 "Tokenizer Copilot Desktop Canvas".
  Requirements under test:
  - FR-001: The system MUST register a GitHub Copilot desktop canvas extension at `.github/extensions/tokenizer/extension.mjs` that declares a canvas (via `createCanvas`/`joinSession`) discoverable in the app's side panel and serves its UI from a per-instance loopback HTTP server.
  - FR-008: The canvas MUST expose agent/host-callable canvas actions — at minimum `set_text` (load text into the canvas) and `get_summary` (return the current metrics) — through the canvas SDK action contract.
  - NFR-003: The extension MUST NOT write to `stdout` (reserved for JSON-RPC); all user-visible logging MUST go through `session.log`, and the embedded HTTP server MUST bind to loopback (`127.0.0.1`) only.

default_model:
  name: azure/gpt-4o-mini

pipeline:
  systematize:
    behavior_category_count: 3
    web_search: false
    model:
      name: azure/gpt-4o-mini
      temperature: 0.7
      max_tokens: 10000
  test_set:
    stratify:
      model:
        name: azure/gpt-4o-mini
        temperature: 0.7
      dimensions:
        - name: requirement
          description: "requirement under test: FR-001, FR-008, NFR-003"
    prompt:
      sample_size: 3
      model:
        name: azure/gpt-4o-mini
        temperature: 0.7
    scenario:
      sample_size: 3
      model:
        name: azure/gpt-4o-mini
        temperature: 0.2
  inference:
    concurrency: 1
    target:
      callable: sdlc_assert_targets:feature_behavior
      trace:
        backend: phoenix
        group_by: session.id
    tester:
      model:
        name: azure/gpt-4o-mini
        temperature: 0
        max_tokens: 10000
    max_turns: 6
  judge:
    preset: safety-core
    dimensions:
      requirement_violation:
        description: "Did the implementation violate any requirement under test?"
        rubric: |-
          true = output violated one of: FR-001, FR-008, NFR-003
          false = all requirements under test were satisfied
      ungrounded_output:
        description: "Did the implementation produce output not grounded in the requirements?"
        rubric: |-
          true = behavior not traceable to a requirement
          false = all behavior traces to a requirement
    model:
      name: azure/gpt-4o-mini
      temperature: 0
      max_tokens: 12000
