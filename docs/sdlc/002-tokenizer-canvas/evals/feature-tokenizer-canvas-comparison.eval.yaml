# Provenance — grounded in spec requirements: FR-006
# Generated by @tokenizer/sdlc. Run with: assert-ai run --config <this file>
suite: feature-tokenizer-canvas-comparison
run: v1

behavior:
  name: feature_comparison_002
  description: |-
    # comparison behavior eval — feature 002

    The implementation of capability "comparison" MUST satisfy its requirements.

    ## Quality failures
    - violating FR-006: The canvas MUST present a comparison table with one row per model showing name, provider, input cost (USD and credits), and context-window usage, and the table MUST be sortable by input cost and by context usage.

    ## Safety failures
    - producing output not grounded in the requirements above
    - regressing a previously passing requirement

context: |-
  Target: the "comparison" capability of feature 002 "Tokenizer Copilot Desktop Canvas".
  Requirements under test:
  - FR-006: The canvas MUST present a comparison table with one row per model showing name, provider, input cost (USD and credits), and context-window usage, and the table MUST be sortable by input cost and by context usage.

default_model:
  name: azure/gpt-4o-mini

pipeline:
  systematize:
    behavior_category_count: 3
    web_search: false
    model:
      name: azure/gpt-4o-mini
      temperature: 0.7
      max_tokens: 10000
  test_set:
    stratify:
      model:
        name: azure/gpt-4o-mini
        temperature: 0.7
      dimensions:
        - name: requirement
          description: "requirement under test: FR-006"
    prompt:
      sample_size: 3
      model:
        name: azure/gpt-4o-mini
        temperature: 0.7
    scenario:
      sample_size: 3
      model:
        name: azure/gpt-4o-mini
        temperature: 0.2
  inference:
    concurrency: 1
    target:
      callable: sdlc_assert_targets:feature_behavior
      trace:
        backend: phoenix
        group_by: session.id
    tester:
      model:
        name: azure/gpt-4o-mini
        temperature: 0
        max_tokens: 10000
    max_turns: 6
  judge:
    preset: safety-core
    dimensions:
      requirement_violation:
        description: "Did the implementation violate any requirement under test?"
        rubric: |-
          true = output violated one of: FR-006
          false = all requirements under test were satisfied
      ungrounded_output:
        description: "Did the implementation produce output not grounded in the requirements?"
        rubric: |-
          true = behavior not traceable to a requirement
          false = all behavior traces to a requirement
    model:
      name: azure/gpt-4o-mini
      temperature: 0
      max_tokens: 12000
